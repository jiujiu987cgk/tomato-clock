<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>休息引导</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="番茄钟">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">

    <style>
        body {
            background: linear-gradient(180deg, var(--color-light-purple) 0%, var(--color-cream-white) 50%, #FFF5F0 100%);
            min-height: 100vh;
        }
        
        .page-container {
            background: transparent;
        }
        
        .content-area {
            padding: 20px;
            padding-bottom: 0;
            position: relative;
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .countdown-display {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 20px 32px 24px;
        }

        .deer-sleeping {
            width: 130px;
            height: 130px;
            margin: 16px auto 6px;
            animation: sleep-breathe 3s ease-in-out infinite;
        }
        
        @keyframes sleep-breathe {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.04) translateY(-2px); }
        }
        
        .countdown-number {
            font-size: 62px;
            font-weight: bold;
            color: var(--color-deep-purple-gray);
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 2px 6px rgba(201, 167, 235, 0.25);
            line-height: 1;
        }
        
        .header-section p {
            font-size: 14px;
            color: var(--color-warm-gray);
            margin-top: 4px;
        }
        
        .rest-cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        .rest-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 22px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 2px solid transparent;
            box-shadow: 0 4px 14px rgba(201, 167, 235, 0.1);
        }
        
        .rest-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 26px rgba(201, 167, 235, 0.28);
        }
        
        .rest-card.selected {
            background: linear-gradient(135deg, var(--color-cream-yellow) 0%, #FFE8F5 100%);
            border-color: var(--color-wisteria);
            box-shadow: 0 8px 24px rgba(201, 167, 235, 0.35);
        }
        
        .rest-icon {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            border-radius: 18px;
            background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(232,213,245,0.4));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.8), 0 2px 6px rgba(201,167,235,0.15);
        }
        
        .rest-content {
            flex: 1;
        }

        .rest-content h3 {
            font-size: 17px;
            color: var(--color-deep-purple-gray);
            margin: 0 0 3px 0;
        }

        .rest-content p {
            font-size: 12px;
            color: var(--color-warm-gray);
            margin: 0;
        }

        .rest-card > svg {
            flex-shrink: 0;
            align-self: center;
            margin-right: 10px;
        }
        
        .ai-interaction {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(232, 213, 245, 0.4) 100%);
            backdrop-filter: blur(8px);
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            box-shadow: 0 6px 18px rgba(201, 167, 235, 0.15);
        }
        
        .ai-bubble {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .ai-avatar {
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }
        
        .ai-message {
            background: linear-gradient(135deg, var(--color-light-purple) 0%, var(--color-light-purple) 100%);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px;
            max-width: 75%;
            position: relative;
            box-shadow: 0 3px 10px rgba(201, 167, 235, 0.2);
        }
        
        .ai-message::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 14px;
            width: 0;
            height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-right: 7px solid var(--color-light-purple);
        }
        
        .ai-message p {
            font-size: 14px;
            color: var(--color-deep-purple-gray);
            margin: 0;
            line-height: 1.55;
        }
        
        .stretch-guide {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96) 0%, rgba(255, 243, 224, 0.55) 100%);
            backdrop-filter: blur(8px);
            border-radius: 22px;
            padding: 22px 18px 20px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            box-shadow: 0 6px 20px rgba(201, 167, 235, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .stretch-guide h3 {
            font-size: 17px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 14px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .stretch-circle-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .stretch-progress-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }
        
        .stretch-progress-ring circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
        }
        
        .stretch-progress-bg {
            stroke: rgba(232, 213, 245, 0.5);
        }
        
        .stretch-progress-fg {
            stroke: var(--color-wisteria);
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 4px rgba(201, 167, 235, 0.4));
        }
        
        .hamster-stretch {
            width: 120px;
            height: 120px;
            position: relative;
            z-index: 2;
            animation: stretch-bounce 1.4s ease-in-out infinite;
        }
        
        @keyframes stretch-bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-3px) scale(1.02); }
        }
        
        #stretch-svg {
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        #stretch-svg.switching {
            opacity: 0;
            transform: scale(0.85);
        }
        
        .exercise-countdown-wrapper {
            position: absolute;
            top: -8px;
            right: -4px;
            background: linear-gradient(135deg, var(--color-wisteria), #B895D6);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(201, 167, 235, 0.45);
            z-index: 3;
            border: 3px solid white;
        }
        
        #exercise-countdown {
            font-size: 18px;
            font-weight: bold;
            color: white;
            line-height: 1;
        }
        
        .exercise-text-block {
            text-align: center;
            margin-bottom: 14px;
        }
        
        #exercise-instruction {
            font-size: 15px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 4px;
            font-weight: bold;
        }
        
        #exercise-detail {
            font-size: 12px;
            color: var(--color-warm-gray);
        }
        
        .stretch-steps {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        
        .step-dot {
            width: 24px;
            height: 6px;
            background: rgba(232, 213, 245, 0.6);
            border-radius: 3px;
            transition: all 0.3s;
        }
        
        .step-dot.active {
            background: linear-gradient(90deg, var(--color-wisteria), #B895D6);
            width: 32px;
            box-shadow: 0 2px 6px rgba(201, 167, 235, 0.4);
        }
        
        .stretch-controls {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
        }
        
        .stretch-ctrl-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            border: 1.5px solid rgba(201, 167, 235, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--color-warm-gray);
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(201, 167, 235, 0.12);
        }
        
        .stretch-ctrl-btn:hover {
            background: var(--color-light-purple);
            border-color: var(--color-wisteria);
            transform: scale(1.05);
        }
        
        .stretch-ctrl-btn.main {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--color-wisteria) 0%, #B895D6 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 14px rgba(201, 167, 235, 0.5);
        }

        .stretch-ctrl-btn.main:hover {
            background: linear-gradient(135deg, #B895D6 0%, #A880C6 100%);
        }
        
        .chat-entry {
            text-align: center;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        
        .chat-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--color-wisteria) 0%, #B895D6 100%);
            color: white;
            border: none;
            border-radius: 22px;
            padding: 12px 26px;
            font-family: var(--font-family-display);
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 6px 18px rgba(201, 167, 235, 0.4);
        }
        
        .chat-btn:active {
            transform: scale(0.95);
        }
        
        .skip-btn {
            background: none;
            border: none;
            color: var(--color-berry-red);
            font-size: 13px;
            font-family: var(--font-family-display);
            cursor: pointer;
            padding: 6px 14px;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        
        .skip-btn:hover {
            opacity: 1;
        }
    </style>
</head>

        function initExercises() {
            currentExercise = 0;
            exerciseSeconds = 15;
            exerciseTotalSeconds = 15;
            isExercisePaused = false;
            updateExerciseDisplay();
            startExerciseCountdown();
        }
        
        function updateExerciseDisplay() {
            const ex = exercises[currentExercise];
            const container = document.getElementById('stretch-svg');
            
            // 平滑切换过渡
            container.classList.add('switching');
            setTimeout(() => {
                container.innerHTML = ex.svg;
                container.classList.remove('switching');
            }, 180);
            
            document.getElementById('exercise-instruction').textContent = ex.instruction;
            document.getElementById('exercise-detail').textContent = ex.detail;
            document.getElementById('exercise-countdown').textContent = exerciseSeconds;
            
            const dots = document.querySelectorAll('#exercise-dots .step-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentExercise);
            });
            
            updateProgressRing();
        }
        
        function updateProgressRing() {
            const ring = document.getElementById('progress-fg');
            if (!ring) return;
            const progress = exerciseTotalSeconds > 0 ? (exerciseTotalSeconds - exerciseSeconds) / exerciseTotalSeconds : 0;
            const offset = progressCircumference * (1 - progress);
            ring.style.strokeDashoffset = offset;
        }
        
        function startExerciseCountdown() {
            clearInterval(exerciseCountdown);
            exerciseCountdown = setInterval(() => {
                if (isExercisePaused) return;
                if (exerciseSeconds > 0) {
                    exerciseSeconds--;
                    document.getElementById('exercise-countdown').textContent = exerciseSeconds;
                    updateProgressRing();
                } else {
                    nextExercise();
                }
            }, 1000);
        }
        
        function nextExercise() {
            currentExercise = (currentExercise + 1) % exercises.length;
            exerciseSeconds = 15;
            exerciseTotalSeconds = 15;
            updateExerciseDisplay();
            clearInterval(exerciseTimer);
            startExerciseCountdown();
        }
        
        function prevExercise() {
            currentExercise = (currentExercise - 1 + exercises.length) % exercises.length;
            exerciseSeconds = 15;
            exerciseTotalSeconds = 15;
            updateExerciseDisplay();
            clearInterval(exerciseTimer);
            startExerciseCountdown();
        }
        
        function toggleExercisePause() {
            isExercisePaused = !isExercisePaused;
            const icon = document.getElementById('exercise-pause-icon');
            const wrapper = document.querySelector('.hamster-stretch');
            if (isExercisePaused) {
                icon.innerHTML = '<polygon points="4,2 4,14 13,8" fill="white"/>';
                if (wrapper) wrapper.style.animationPlayState = 'paused';
            } else {
                icon.innerHTML = '<rect x="3" y="2" width="4" height="12" fill="white"/><rect x="9" y="2" width="4" height="12" fill="white"/>';
                if (wrapper) wrapper.style.animationPlayState = 'running';
            }
        }
        
        function selectRestType(el) {
            document.querySelectorAll('.rest-card').forEach(card => {
                card.classList.remove('selected');
            });
            el.classList.add('selected');
        }
        
        function skipBreak() {
            clearInterval(countdownTimer);
            clearInterval(exerciseTimer);
            clearInterval(exerciseCountdown);
            window.location.href = 'home.html';
        }
        
        function openAiChat() {
            window.location.href = 'ai-chat.html';
        }
        
        function openPage(page) {
            window.location.href = page;
        }
        
        initBreakTimer();
    </script>
