<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="番茄钟">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .content-area {
            padding: 0;
            padding-bottom: 230px;
            height: calc(100vh - 54px);
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: linear-gradient(135deg, var(--color-wisteria) 0%, #B895D6 50%, #A880C6 100%);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 16px rgba(201, 167, 235, 0.35);
            position: relative;
        }
        
        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(180deg, rgba(201,167,235,0.25) 0%, transparent 100%);
        }
        
        .header-back {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        
        .header-back:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .deer-avatar-lg {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            padding: 2px;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.4), 0 4px 12px rgba(0,0,0,0.1);
        }
        
        .header-info {
            flex: 1;
        }
        
        .header-info h2 {
            font-size: 17px;
            color: white;
            margin-bottom: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }
        
        .online-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--color-mint-green);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
            box-shadow: 0 0 6px rgba(181, 234, 215, 0.8);
        }
        
        .online-status span {
            font-size: 11px;
            color: rgba(255,255,255,0.85);
        }
        
        .clear-btn {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(4px);
            border: none;
            border-radius: 12px;
            padding: 6px 12px;
            color: white;
            font-family: var(--font-family-display);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .clear-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .emotion-bar {
            background: linear-gradient(180deg, #FFFFFF 0%, var(--color-cream-white) 100%);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid rgba(232, 213, 245, 0.6);
            box-shadow: 0 2px 8px rgba(201, 167, 235, 0.06);
        }
        
        .emotion-bar::-webkit-scrollbar { height: 0; }
        
        .emotion-tag {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: linear-gradient(135deg, var(--color-cream-yellow) 0%, #FFE8F5 100%);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s;
            flex-shrink: 0;
            border: 1.5px solid transparent;
            min-width: 56px;
        }
        
        .emotion-tag:hover {
            background: linear-gradient(135deg, var(--color-light-purple) 0%, #FFE8F5 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(201, 167, 235, 0.2);
        }
        
        .emotion-tag.active {
            background: linear-gradient(135deg, var(--color-wisteria) 0%, #B895D6 100%);
            box-shadow: 0 4px 12px rgba(201, 167, 235, 0.45);
            border-color: rgba(255,255,255,0.6);
        }
        
        .emotion-tag.active span {
            color: white;
        }
        
        .emotion-icon {
            width: 32px;
            height: 32px;
        }
        
        .emotion-tag span {
            font-size: 11px;
            color: var(--color-warm-gray);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px;
            background-color: var(--color-cream-white);
            background-image: linear-gradient(180deg, var(--color-cream-white) 0%, #FFF5F8 100%);
            scroll-behavior: smooth;
        }
        
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            animation: msg-in 0.35s ease-out;
        }
        
        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            box-shadow: 0 2px 6px rgba(201, 167, 235, 0.15);
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 11px 15px;
            border-radius: 18px;
            position: relative;
        }
        
        .message-bubble.ai {
            background: linear-gradient(135deg, var(--color-light-purple) 0%, var(--color-light-purple) 100%);
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 3px 10px rgba(201, 167, 235, 0.2);
        }
        
        .message-bubble.user {
            background: linear-gradient(135deg, #FF8888 0%, var(--color-berry-red) 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
            box-shadow: 0 3px 10px rgba(255, 107, 107, 0.3);
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.55;
        }
        
        .message-text.user {
            color: white;
        }
        
        .system-message {
            text-align: center;
            margin-bottom: 18px;
        }
        
        .system-content {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(255, 243, 224, 0.95) 0%, rgba(232, 213, 245, 0.4) 100%);
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid rgba(201, 167, 235, 0.2);
            box-shadow: 0 2px 8px rgba(201, 167, 235, 0.1);
        }
        
        .system-deer {
            width: 36px;
            height: 36px;
        }
        
        .system-content p {
            font-size: 11px;
            color: var(--color-warm-gray);
            margin: 0;
        }
        
        .quick-commands {
            position: fixed;
            bottom: 152px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            padding: 10px 12px 12px;
            display: flex;
            gap: 8px;
            justify-content: space-between;
            background: rgba(255, 251, 247, 0.96);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(232, 213, 245, 0.4);
            box-shadow: 0 -4px 16px rgba(201, 167, 235, 0.08);
            z-index: 90;
        }
        
        .quick-commands::-webkit-scrollbar { height: 0; }
        
        .quick-btn {
            flex: 1;
            background: linear-gradient(135deg, #FFFFFF 0%, var(--color-cream-yellow) 100%);
            border: 1.5px solid rgba(201, 167, 235, 0.4);
            border-radius: 16px;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(201, 167, 235, 0.1);
            min-width: 0;
        }
        
        .quick-btn:hover {
            background: linear-gradient(135deg, var(--color-cream-yellow) 0%, #FFE8F5 100%);
            border-color: var(--color-wisteria);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(201, 167, 235, 0.25);
        }
        
        .quick-btn:active {
            transform: scale(0.95);
        }
        
        .quick-icon {
            width: 30px;
            height: 30px;
        }
        
        .quick-btn span {
            font-size: 11px;
            color: var(--color-deep-purple-gray);
        }
        
        .input-area {
            position: fixed;
            bottom: 83px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(232, 213, 245, 0.6);
            box-shadow: 0 -4px 16px rgba(201, 167, 235, 0.1);
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--color-cream-yellow) 0%, #FFE8F5 100%);
            border: 1.5px solid rgba(232, 213, 245, 0.7);
            border-radius: 30px;
            padding: 7px 8px 7px 14px;
            transition: all 0.3s;
            box-shadow: inset 0 1px 3px rgba(255,255,255,0.6);
        }
        
        .input-wrapper:focus-within {
            border-color: var(--color-wisteria);
            box-shadow: 0 0 0 3px rgba(201, 167, 235, 0.15), inset 0 1px 3px rgba(255,255,255,0.6);
            background: white;
        }
        
        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            font-family: var(--font-family-display);
            font-size: 14px;
            color: var(--color-deep-purple-gray);
            outline: none;
        }
        
        .chat-input::placeholder {
            color: #B8A8C8;
        }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--color-wisteria);
            border-radius: 50%;
            animation: typing-bounce 1.4s ease-in-out infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing-bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        
        .send-btn {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-wisteria) 0%, #B895D6 100%);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 10px rgba(201, 167, 235, 0.4);
            flex-shrink: 0;
        }
        
        .send-btn:active {
            transform: scale(0.9);
        }
        
        .send-btn:hover {
            box-shadow: 0 4px 14px rgba(201, 167, 235, 0.55);
        }
    </style>
</head>

        let chatHistory = [];
        
        function loadChatHistory() {
            const saved = localStorage.getItem('pomodoro_chat_history');
            if (saved) {
                chatHistory = JSON.parse(saved);
                renderChatHistory();
            }
        }
        
        function saveChatHistory() {
            if (chatHistory.length > 50) {
                chatHistory = chatHistory.slice(-50);
            }
            localStorage.setItem('pomodoro_chat_history', JSON.stringify(chatHistory));
        }
        
        function renderChatHistory() {
            const container = document.querySelector('.chat-messages');
            const systemMsg = container.querySelector('.system-message');
            container.innerHTML = '';
            if (systemMsg) container.appendChild(systemMsg);
            
            chatHistory.forEach(msg => {
                if (msg.role === 'user') {
                    addUserMessageElement(msg.text);
                } else {
                    addAiMessageElement(msg.text);
                }
            });
        }

            const container = document.querySelector('.chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const userAvatar = localStorage.getItem('pomodoro_avatar');

                avatarHtml = `<img src="${userAvatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`;

        function selectEmotion(el) {
            document.querySelectorAll('.emotion-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            el.classList.add('active');
            
            const emotion = el.querySelector('span').textContent;
            const responses = getEmotionResponses()[emotion];
            if (responses && responses.length > 0) {
                const response = responses[Math.floor(Math.random() * responses.length)];
                showTypingIndicator(() => {
                    addAiMessage(response);
                });
            }
        }

                        <ellipse cx="29" cy="14" rx="2.8" ry="3.5" fill="#F5CC60" stroke="#8B6010" stroke-width="1"/>
                        <ellipse cx="20" cy="22" rx="12" ry="10.5" fill="#F5CC60" stroke="#8B6010" stroke-width="1.8"/>
                        <ellipse cx="20" cy="25" rx="7.5" ry="5.5" fill="#FFE8B0"/>
                        <ellipse cx="15" cy="20" rx="5" ry="4.5" fill="#2D1810" stroke="#1A0800" stroke-width="0.6"/>
                        <ellipse cx="25" cy="20" rx="5" ry="4.5" fill="#2D1810" stroke="#1A0800" stroke-width="0.6"/>
                        <circle cx="13.5" cy="18.5" r="1.4" fill="white"/>
                        <circle cx="23.5" cy="18.5" r="1.4" fill="white"/>
                        <circle cx="16" cy="20.5" r="0.8" fill="white"/>
                        <circle cx="26" cy="20.5" r="0.8" fill="white"/>
                        <circle cx="12.5" cy="17.5" r="0.6" fill="white" opacity="0.7"/>
                        <circle cx="22.5" cy="17.5" r="0.6" fill="white" opacity="0.7"/>
                        <g transform="translate(11,18) scale(0.35)"><polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,1 3.5,5 0,2.5 -3.5,5 -2.5,1 -5,-1.5 -1.5,-1.5" fill="#FFD700" opacity="0.9"/></g>
                        <g transform="translate(21,18) scale(0.35)"><polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,1 3.5,5 0,2.5 -3.5,5 -2.5,1 -5,-1.5 -1.5,-1.5" fill="#FFD700" opacity="0.9"/></g>
                        <ellipse cx="20" cy="25" rx="3" ry="2" fill="#FF8080" stroke="#C04040" stroke-width="0.6"/>
                        <circle cx="20" cy="24.5" r="1.2" fill="#FFCCBB"/>
                        <path d="M17 28 Q20 31 23 28" stroke="#3D2010" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                        <circle cx="9" cy="23" r="3.5" fill="#FFCCAA" opacity="0.7"/>
                        <circle cx="31" cy="23" r="3.5" fill="#FFCCAA" opacity="0.7"/>
                    </svg>
                </div>
                <div class="message-bubble ai">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.appendChild(indicatorDiv);
            container.scrollTop = container.scrollHeight;
            
            setTimeout(() => {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
                callback();
            }, 1500);
        }
        
        function sendMessage() {
            const input = document.querySelector('.chat-input');
            const message = input.value.trim();
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            
            showTypingIndicator(() => {
                const deerName = getDeerName();
                const call = getDeerCall();
                const responses = [
                    `${call}说得对呢~ 🥰 ${deerName}会一直陪着你的！不管发生什么，${deerName}都在这里哦~`,
                    `唔~ ${deerName}听懂了！${call}真棒，愿意说出来就是好的开始呢~ 💖 有什么事都可以和${deerName}说的！`,
                    `嘻嘻，${call}的心思${deerName}都懂哦~ 😘 有什么想做的都告诉${deerName}吧，${deerName}帮你一起想办法！`,
                    `嗯嗯！${deerName}收到啦~ 🐾 ${call}今天的状态真不错呢，继续保持下去哦~ ✨`,
                    `哇！${call}说的好有道理呀！🥰 ${deerName}的小脑袋都亮起来啦~ 和${call}聊天好开心！`,
                    `${call}你知道吗？${deerName}每次看到你努力的样子，都觉得好感动呢~ 🌟 你真的很棒很棒！`,
                    `嘿嘿，${deerName}最喜欢听${call}说话了~ 🐾 声音好听，说的内容也超有意思，多说一点嘛！💕`,
                    `呜~ ${deerName}收到${call}的心意啦！💖 不管${call}想做什么，${deerName}都会全力支持哒！冲鸭——！🔥`
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addAiMessage(randomResponse);
            });
        }
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
        
        function sendQuickMessage(type) {
            const deerName = getDeerName();
            const call = getDeerCall();
            const userMessages = {
                'tired': `${deerName}，我有点累了...`,
                'unfocus': `我今天怎么也专注不下去，怎么办呀`,
                'encourage': `${deerName}，给我一点鼓励好不好~`,
                'chat': `${deerName}，我们来聊聊天吧！`
            };
            const aiResponses = {
                'tired': `呜~ 摸摸头！🥺 ${call}辛苦啦，${deerName}帮你揉揉小脑袋~ 累了就休息一下嘛，去喝杯热水，或者站起来伸个懒腰，${deerName}会一直在这里等你回来的哦！💖`,
                'unfocus': `哎呀，没关系哒~ 😘 ${deerName}最懂这种感觉了！要不我们先试试深呼吸三次，然后从最简单的小任务开始做起？${call}超棒的，一定可以慢慢进入状态哒！加油加油！💪`,
                'encourage': `当然要鼓励${call}啦！😤 ${deerName}最喜欢${call}了！${call}每天都有在努力，真的超级厉害呢~ 不管今天完成了什么，都是值得骄傲的事情哦！${deerName}永远支持${call}！✨🔥`,
                'chat': `好呀好呀！🥰 ${deerName}最喜欢和${call}聊天啦~ 今天有没有发生什么有趣的事情呀？或者有什么想和${deerName}分享的小秘密？${deerName}耳朵都竖起来啦，快说快说~ 🐾💕`
            };
            const userMsg = userMessages[type] || type;
            const aiReply = aiResponses[type] || `${deerName}在听哦~ ${call}说什么${deerName}都喜欢听~ 😊`;
            addUserMessage(userMsg);
            showTypingIndicator(() => {
                addAiMessage(aiReply);
            });
        }
        
        function addUserMessage(text) {
            chatHistory.push({ role: 'user', text: text });
            saveChatHistory();
            addUserMessageElement(text);
        }
        
        function addAiMessage(text) {
            chatHistory.push({ role: 'ai', text: text });
            saveChatHistory();
            addAiMessageElement(text);
        }
        
        function openPage(page) {
            window.location.href = page;
        }
        
        function clearChat() {
            chatHistory = [];
            localStorage.removeItem('pomodoro_chat_history');
            const container = document.querySelector('.chat-messages');
            const systemMsg = container.querySelector('.system-message');
            container.innerHTML = '';
            if (systemMsg) container.appendChild(systemMsg);
        }
        
        loadChatHistory();
        
        function getDeerName() {
            return localStorage.getItem('pomodoro_deer_name') || '小鹿';
        }

        function getDeerCall() {
            return localStorage.getItem('pomodoro_deer_call') || '宝宝';
        }

        function loadProfile() {
            const avatar = localStorage.getItem('pomodoro_avatar');
            if (avatar) {
                const initialUserAvatar = document.getElementById('initial-user-avatar');
                if (initialUserAvatar) {
                    initialUserAvatar.innerHTML = `<img src="${avatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`;
                }
            }

            const deerName = getDeerName();
            const call = getDeerCall();
            document.getElementById('chat-display-name').textContent = deerName + '陪伴官';

            const welcome1 = document.getElementById('welcome-msg-1');
            if (welcome1) welcome1.textContent = `呜~ ${deerName}来啦！🥰 今天${call}想聊什么呢？${deerName}会一直陪着你哒~ 💖`;
            const welcome2 = document.getElementById('welcome-msg-2');
            if (welcome2) welcome2.textContent = `摸摸头~ 🐾 ${call}不要难过嘛，焦虑的时候${deerName}会一直陪着你的哦~ 要不我们先吃一个小番茄吧？就25分钟，${deerName}陪你一起专注，好不好呀？😘`;

            const wallpaper = localStorage.getItem('pomodoro_wallpaper');
            const wallpaperColor = localStorage.getItem('pomodoro_wallpaper_color');
            const messagesEl = document.querySelector('.chat-messages');
            if (wallpaper) {
                messagesEl.style.backgroundImage = `url(${wallpaper})`;
                messagesEl.style.backgroundSize = 'cover';
                messagesEl.style.backgroundPosition = 'center';
                messagesEl.style.backgroundRepeat = 'no-repeat';
                messagesEl.style.backgroundColor = '#FFFBF7';
            } else if (wallpaperColor && wallpaperColor !== 'default') {
                messagesEl.style.backgroundImage = 'none';
                messagesEl.style.backgroundColor = wallpaperColor;
            } else {
                messagesEl.style.backgroundImage = 'linear-gradient(180deg, var(--color-cream-white) 0%, #FFF5F8 100%)';
                messagesEl.style.backgroundColor = '';
            }
        }
        
        loadProfile();
    </script>
</body>
</html>
