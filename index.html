</head>    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--color-light-purple) 0%, var(--color-cream-yellow) 50%, var(--color-warm-pink) 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            font-size: 16px;
            color: var(--color-warm-gray);
        }

        .app-icon {
            width: 48px;
            height: 48px;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-card {
            background: var(--color-cream-white);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(201, 167, 235, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .page-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(201, 167, 235, 0.4);
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 12px 16px;
            background: var(--color-light-purple);
            border-radius: 20px;
        }

        .page-icon {
            width: 32px;
            height: 32px;
        }

        .page-title {
            font-size: 18px;
            color: var(--color-deep-purple-gray);
            font-weight: bold;
        }

        .page-iframe {
            width: 100%;
            height: 852px;
            border: none;
            border-radius: 50px;
            overflow: hidden;
            display: block;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
        }

        .footer p {
            font-size: 14px;
            color: var(--color-warm-gray);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }

        .footer-links a {
            font-size: 14px;
            color: var(--color-wisteria);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--color-berry-red);
        }

        @media (max-width: 900px) {
            .pages-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 28px;
            }

            .page-card {
                padding: 10px;
            }

            .page-iframe {
                height: 852px;
            }
        }
    </style>
</head>
