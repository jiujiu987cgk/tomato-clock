<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务规划</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="番茄钟">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .content-area {
            padding: 20px;
            padding-bottom: 0;
            position: relative;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 22px;
            color: var(--color-deep-purple-gray);
        }
        
        .header-btn {
            background: var(--color-wisteria);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 8px 16px;
            font-family: var(--font-family-display);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        
        
        .task-card {
            background: var(--color-cream-yellow);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            position: relative;
            z-index: 2;
        }
        
        .task-checkbox {
            width: 28px;
            height: 28px;
            border: 2px solid var(--color-wisteria);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .task-checkbox.checked {
            background: var(--color-mint-green);
            border-color: var(--color-mint-green);
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-size: 16px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 8px;
        }
        
        .task-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .tomato-count {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .tomato-count button {
            width: 24px;
            height: 24px;
            background: var(--color-warm-pink);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }
        
        .paw-rating {
            display: flex;
            gap: 4px;
        }
        
        .paw-icon {
            width: 16px;
            height: 16px;
        }
        
        .paw-icon.filled {
            opacity: 1;
        }
        
        .paw-icon.empty {
            opacity: 0.3;
        }
        
        .brain-dump {
            background: var(--color-light-purple);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            position: relative;
        }
        
        .brain-dump-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .brain-dump-header h3 {
            font-size: 18px;
            color: var(--color-deep-purple-gray);
        }
        
        .butterfly-icon {
            width: 24px;
            height: 24px;
        }
        
        .brain-dump textarea {
            width: 100%;
            min-height: 80px;
            background: rgba(255,255,255,0.6);
            border: none;
            border-radius: 16px;
            padding: 12px;
            font-family: var(--font-family-display);
            font-size: 14px;
            color: var(--color-warm-gray);
            resize: none;
            outline: none;
        }
        
        .brain-dump textarea::placeholder {
            color: var(--color-warm-gray);
            opacity: 0.6;
        }
        
        .plan-b-card {
            background: var(--color-cream-yellow);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .plan-b-card:active {
            transform: scale(0.98);
        }
        
        .dog-sign {
            width: 50px;
            height: 50px;
        }
        
        .plan-b-content h3 {
            font-size: 16px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 4px;
        }
        
        .plan-b-content p {
            font-size: 12px;
            color: var(--color-warm-gray);
        }
        
        .add-task-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: flex-end;
            z-index: 200;
        }
        
        .add-task-modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--color-cream-white);
            border-radius: 28px 28px 0 0;
            padding: 30px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            font-size: 20px;
            color: var(--color-deep-purple-gray);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            font-size: 14px;
            color: var(--color-warm-gray);
            margin-bottom: 8px;
            display: block;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            background: var(--color-cream-yellow);
            border: 2px solid var(--color-light-purple);
            border-radius: 16px;
            padding: 12px;
            font-family: var(--font-family-display);
            font-size: 14px;
            color: var(--color-deep-purple-gray);
            outline: none;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--color-wisteria);
        }
        
        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        
        .form-actions button {
            flex: 1;
            padding: 14px;
            border-radius: 20px;
            font-family: var(--font-family-display);
            font-size: 16px;
            cursor: pointer;
            border: none;
        }
        
        .btn-cancel {
            background: var(--color-light-purple);
            color: var(--color-warm-gray);
        }
        
        .btn-submit {
            background: var(--color-wisteria);
            color: white;
        }
        
        .scrollable-content {
            overflow-y: auto;
        }
    </style>
</head>

                    <circle cx="24" cy="24" r="18" fill="none" stroke="currentColor" stroke-width="4" stroke-dasharray="113" stroke-dashoffset="30" stroke-linecap="round"/>
                    <circle cx="24" cy="24" r="2.5" fill="currentColor"/>
                    <line x1="24" y1="24" x2="24" y2="10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <line x1="24" y1="24" x2="32" y2="24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <span>计时</span>
            </div>
            <div class="nav-item active">
                <svg viewBox="0 0 48 48" fill="currentColor">
                    <ellipse cx="20" cy="12" rx="4" ry="12" fill="#FFF3E0"/>
                    <ellipse cx="28" cy="12" rx="4" ry="12" fill="#FFF3E0"/>
                    <circle cx="24" cy="28" r="12" fill="#FFF3E0"/>
                    <circle cx="20" cy="26" r="2.5" fill="currentColor"/>
                    <circle cx="28" cy="26" r="2.5" fill="currentColor"/>
                    <rect x="14" y="38" width="20" height="8" rx="2" fill="#C9A7EB"/>
                    <line x1="16" y1="42" x2="32" y2="42" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>任务</span>
            </div>
            <div class="nav-item" onclick="openPage('dashboard.html')">
                <svg viewBox="0 0 48 48" fill="currentColor">
                    <rect x="8" y="10" width="12" height="28" rx="2" fill="#E8D5F5"/>
                    <rect x="20" y="18" width="12" height="20" rx="2" fill="#C9A7EB"/>
                    <rect x="32" y="14" width="12" height="24" rx="2" fill="#FFB3BA"/>
                </svg>
                <span>数据</span>
            </div>
            <div class="nav-item" onclick="openPage('settings.html')">
                <svg viewBox="0 0 48 48" fill="currentColor">
                    <circle cx="24" cy="24" r="6" fill="#C9A7EB"/>
                    <circle cx="24" cy="24" r="16" fill="none" stroke="currentColor" stroke-width="4"/>
                    <circle cx="24" cy="8" r="3" fill="currentColor"/>
                    <circle cx="40" cy="24" r="3" fill="currentColor"/>
                    <circle cx="24" cy="40" r="3" fill="currentColor"/>
                    <circle cx="8" cy="24" r="3" fill="currentColor"/>
                </svg>
                <span>设置</span>
            </div>
        </div>
    </div>
    
    <div id="planb-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: flex-end; z-index: 200;">
        <div style="background: var(--color-cream-white); border-radius: 28px 28px 0 0; padding: 30px; width: 100%; max-height: 80vh; overflow-y: auto;">
            <h3 style="font-size: 20px; color: var(--color-deep-purple-gray); margin-bottom: 20px; text-align: center;">如果-那么计划</h3>
            
            <div style="margin-bottom: 20px;">
                <p style="font-size: 14px; color: var(--color-warm-gray); margin-bottom: 16px;">
                    如果遇到什么干扰，你打算怎么办呢？写下来能提高完成率哦~ 🐾
                </p>
                <div class="form-group">
                    <label>当...发生时</label>
                    <input type="text" id="if-condition" placeholder="例如：当我忍不住想刷手机时">
                </div>
                <div class="form-group">
                    <label>那么我就...</label>
                    <input type="text" id="then-action" placeholder="例如：立刻做三个深呼吸">
                </div>
            </div>
            
            <div class="form-actions">
                <button class="btn-cancel" onclick="closePlanBModal()">关闭</button>
                <button class="btn-submit" onclick="savePlanB()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="add-task-modal" id="add-task-modal">
        <div class="modal-content">
            <h3>添加新任务</h3>
            
            <div class="form-group">
                <label>任务名称</label>
                <input type="text" id="task-name" placeholder="输入任务名称">
            </div>
            
            <div class="form-group">
                <label>任务描述</label>
                <textarea id="task-desc" placeholder="描述一下这个任务"></textarea>
            </div>
            
            <div class="form-group">
                <label>番茄数量</label>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button onclick="adjustTomatoInput(-1)" class="btn-secondary">-</button>
                    <span id="tomato-input-value" style="font-size: 20px; color: var(--color-deep-purple-gray);">1</span>
                    <button onclick="adjustTomatoInput(1)" class="btn-secondary">+</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>承诺度</label>
                <div class="paw-rating" style="gap: 8px;">
                    <svg class="paw-icon empty" onclick="setPawRating(this, 1)" viewBox="0 0 24 24" style="width: 32px; height: 32px; cursor: pointer;">
                        <circle cx="12" cy="12" r="6" fill="#C9A7EB"/>
                        <circle cx="6" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="6" cy="16" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="16" r="3" fill="#C9A7EB"/>
                    </svg>
                    <svg class="paw-icon empty" onclick="setPawRating(this, 2)" viewBox="0 0 24 24" style="width: 32px; height: 32px; cursor: pointer;">
                        <circle cx="12" cy="12" r="6" fill="#C9A7EB"/>
                        <circle cx="6" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="6" cy="16" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="16" r="3" fill="#C9A7EB"/>
                    </svg>
                    <svg class="paw-icon empty" onclick="setPawRating(this, 3)" viewBox="0 0 24 24" style="width: 32px; height: 32px; cursor: pointer;">
                        <circle cx="12" cy="12" r="6" fill="#C9A7EB"/>
                        <circle cx="6" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="6" cy="16" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="16" r="3" fill="#C9A7EB"/>
                    </svg>
                    <svg class="paw-icon empty" onclick="setPawRating(this, 4)" viewBox="0 0 24 24" style="width: 32px; height: 32px; cursor: pointer;">
                        <circle cx="12" cy="12" r="6" fill="#C9A7EB"/>
                        <circle cx="6" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="6" cy="16" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="16" r="3" fill="#C9A7EB"/>
                    </svg>
                    <svg class="paw-icon empty" onclick="setPawRating(this, 5)" viewBox="0 0 24 24" style="width: 32px; height: 32px; cursor: pointer;">
                        <circle cx="12" cy="12" r="6" fill="#C9A7EB"/>
                        <circle cx="6" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="8" r="3" fill="#C9A7EB"/>
                        <circle cx="6" cy="16" r="3" fill="#C9A7EB"/>
                        <circle cx="18" cy="16" r="3" fill="#C9A7EB"/>
                    </svg>
                </div>
            </div>
            
            <div class="form-actions">
                <button class="btn-cancel" onclick="closeAddTaskModal()">取消</button>
                <button class="btn-submit" onclick="submitTask()">添加任务</button>
            </div>
        </div>
    </div>

    <script src="assets/js/common.js"></script>
    <script>
        let tomatoValue = 1;
        let tasks = [];
        let pawRating = 3;
        
        function loadTasks() {
            const saved = localStorage.getItem('pomodoro_tasks');
            tasks = saved ? JSON.parse(saved) : getDefaultTasks();
            renderTasks();
            
            const savedDump = localStorage.getItem('pomodoro_brain_dump');
            if (savedDump) {
                document.querySelector('.brain-dump textarea').value = savedDump;
            }
            
            updatePlanBDisplay();
        }
        
        function getDefaultTasks() {
            return [
                { id: '1', title: '完成项目设计稿', tomatoes: 3, commitment: 3, completed: false, createdAt: Date.now() },
                { id: '2', title: '整理会议记录', tomatoes: 1, commitment: 2, completed: true, createdAt: Date.now() },
                { id: '3', title: '学习新框架', tomatoes: 2, commitment: 4, completed: false, createdAt: Date.now() }
            ];
        }
        
        function saveTasks() {
            localStorage.setItem('pomodoro_tasks', JSON.stringify(tasks));
        }
        
        function renderTasks() {
            const container = document.querySelector('.scrollable-content');
            const existingCards = container.querySelectorAll('.task-card');
            existingCards.forEach(card => card.remove());
            
            tasks.forEach((task, index) => {
                const card = createTaskCard(task, index);
                const brainDump = container.querySelector('.brain-dump');
                container.insertBefore(card, brainDump);
            });
        }
        
        function createTaskCard(task, index) {
            const card = document.createElement('div');
            card.className = 'task-card';
            
            const checkedClass = task.completed ? ' checked' : '';
            const checkDisplay = task.completed ? 'block' : 'none';
            const titleStyle = task.completed ? 'text-decoration: line-through; color: var(--color-warm-gray);' : '';
            
            card.innerHTML = `
                <div class="task-checkbox${checkedClass}" onclick="toggleTaskByIndex(${index})">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="#3D334A" style="display: ${checkDisplay};">
                        <path d="M3 7L6 10L13 4" stroke="#3D334A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="task-content">
                    <div class="task-title" style="${titleStyle}">${task.title}</div>
                    <div class="task-meta">
                        <div class="tomato-count">
                            <button onclick="changeTomato(event, ${index}, -1)">-</button>
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="#FF6B6B">
                                <circle cx="10" cy="11" r="6" fill="#FF6B6B"/>
                                <path d="M10 5L9 2L11 2Z" fill="#B5EAD7"/>
                            </svg>
                            <span style="font-size: 12px; color: var(--color-warm-gray);">${task.tomatoes}</span>
                            <button onclick="changeTomato(event, ${index}, 1)">+</button>
                        </div>
                        <div class="paw-rating">
                            ${generatePawIcons(task.commitment)}
                        </div>
                    </div>
                </div>
                <button onclick="deleteTask(event, ${index})" style="background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;opacity:0.5;transition:opacity 0.2s;" onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.5'">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="#FF6B6B">
                        <line x1="4" y1="4" x2="14" y2="14" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
                        <line x1="14" y1="4" x2="4" y2="14" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            `;
            return card;
        }
        
        function generatePawIcons(count) {
            let html = '';
            for (let i = 0; i < 5; i++) {
                const filled = i < count ? 'filled' : 'empty';
                html += `<svg class="paw-icon ${filled}" viewBox="0 0 16 16">
                    <circle cx="8" cy="8" r="4" fill="#C9A7EB"/>
                    <circle cx="4" cy="6" r="2" fill="#C9A7EB"/>
                    <circle cx="12" cy="6" r="2" fill="#C9A7EB"/>
                    <circle cx="4" cy="10" r="2" fill="#C9A7EB"/>
                    <circle cx="12" cy="10" r="2" fill="#C9A7EB"/>
                </svg>`;
            }
            return html;
        }
        
        function toggleTaskByIndex(index) {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        }
        
        function changeTomato(e, index, delta) {
            e.stopPropagation();
            const newCount = tasks[index].tomatoes + delta;
            if (newCount >= 1 && newCount <= 10) {
                tasks[index].tomatoes = newCount;
                saveTasks();
                renderTasks();
            }
        }
        
        function deleteTask(e, index) {
            e.stopPropagation();
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }
        
        function openAddTaskModal() {
            const savedRating = localStorage.getItem('pomodoro_paw_rating');
            if (savedRating) {
                pawRating = parseInt(savedRating);
                const container = document.querySelector('#add-task-modal .paw-rating');
                const paws = container.querySelectorAll('.paw-icon');
                paws.forEach((paw, index) => {
                    if (index < pawRating) {
                        paw.classList.remove('empty');
                        paw.classList.add('filled');
                    } else {
                        paw.classList.remove('filled');
                        paw.classList.add('empty');
                    }
                });
            }
            document.getElementById('add-task-modal').classList.add('active');
        }
        
        function closeAddTaskModal() {
            document.getElementById('add-task-modal').classList.remove('active');
        }
        
        function adjustTomatoInput(delta) {
            tomatoValue = Math.max(1, Math.min(10, tomatoValue + delta));
            document.getElementById('tomato-input-value').textContent = tomatoValue;
        }
        
        function setPawRating(el, rating) {
            pawRating = rating;
            const container = el.parentElement;
            const paws = container.querySelectorAll('.paw-icon');
            
            paws.forEach((paw, index) => {
                if (index < rating) {
                    paw.classList.remove('empty');
                    paw.classList.add('filled');
                } else {
                    paw.classList.remove('filled');
                    paw.classList.add('empty');
                }
            });
            
            localStorage.setItem('pomodoro_paw_rating', rating);
        }
        
        function submitTask() {
            const nameInput = document.getElementById('task-name');
            const title = nameInput.value.trim();
            if (!title) return;
            
            const newTask = {
                id: Date.now().toString(),
                title: title,
                tomatoes: tomatoValue,
                commitment: pawRating,
                completed: false,
                createdAt: Date.now()
            };
            
            tasks.push(newTask);
            saveTasks();
            renderTasks();
            
            nameInput.value = '';
            tomatoValue = 1;
            document.getElementById('tomato-input-value').textContent = '1';
            closeAddTaskModal();
        }
        
        function openPlanBModal() {
            document.getElementById('planb-modal').style.display = 'flex';
            const saved = localStorage.getItem('pomodoro_planb');
            if (saved) {
                const planb = JSON.parse(saved);
                document.getElementById('if-condition').value = planb.if || '';
                document.getElementById('then-action').value = planb.then || '';
            }
        }
        
        function closePlanBModal() {
            document.getElementById('planb-modal').style.display = 'none';
        }
        
        function savePlanB() {
            const ifCond = document.getElementById('if-condition').value.trim();
            const thenAct = document.getElementById('then-action').value.trim();
            if (ifCond && thenAct) {
                localStorage.setItem('pomodoro_planb', JSON.stringify({ if: ifCond, then: thenAct }));
                updatePlanBDisplay();
            }
            closePlanBModal();
        }
        
        function updatePlanBDisplay() {
            const saved = localStorage.getItem('pomodoro_planb');
            const display = document.getElementById('planb-display');
            if (saved) {
                const planb = JSON.parse(saved);
                display.innerHTML = '如果 ' + planb.if + '<br>那么 ' + planb.then;
            } else {
                display.textContent = '准备好应对突发状况了吗？';
            }
        }
        
        function openPage(page) {
            window.location.href = page;
        }
        
        function saveBrainDump() {
            const textarea = document.querySelector('.brain-dump textarea');
            localStorage.setItem('pomodoro_brain_dump', textarea.value);
        }
        
        loadTasks();
    </script>
</body>
</html>
